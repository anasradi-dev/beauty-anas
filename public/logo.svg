  <title id="title">BEAUTY Cosmetic Commission logo</title>
  <desc id="desc">Dark rounded B mark with BEAUTY Cosmetic Commission wordmark.</desc>
  <rect width="300" height="70" fill="#ffffff"/>
  <rect x="16" y="12" width="44" height="44" rx="10" fill="#101827"/>
